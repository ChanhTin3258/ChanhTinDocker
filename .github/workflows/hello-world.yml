name: Thử nghiệm đọc file README  # Tên quy trình

on:
  push:
    branches: [ "main" ]  # Chạy khi có code mới đẩy lên nhánh main

jobs:
  thuc_hanh_doc_file:
    runs-on: ubuntu-latest       # Mượn máy ảo Ubuntu của GitHub để chạy

    steps:
      - name: Bước 1 - Xin chào
        run: echo "Hello HUTECH!"  # Lệnh in ra màn hình

      - name: Bước 2 - Tải code
        run: echo "Đang tải code..."
        # uses: actions/checkout@v4  # Robot tự động copy code vào máy ảo (Nên bỏ comment dòng này để code hoạt động)

      - name: Bước 3 - Đọc file
        run: |
          if [ -f README.md ]; then
            cat README.md
          else
            echo "Không tìm thấy file README.md"
          fi

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="chanhtin3258/node-hello:latest"
          CONTAINER_PORT=80
          # Gọi Webhook để deploy
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          # Tách nội dung và mã HTTP Code
          BODY=$(echo "$RESPONSE" | sed '$d') # Sửa lỗi chính tả từ "$d" thành '$d'
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
